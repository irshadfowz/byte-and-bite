<!DOCTYPE html>
<html>
<head>
   <title>Byte & Bite</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" href="../img/favicon.png">

    <style>
        body{
            background-image: url(../img/hero-bg.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment:fixed;
            background-position: center;
            /* backdrop-filter: blur(3px); */
        }
        #container{
            border: solid white 2px;
            display:inline-block;
            background-image:url(../img/hero-bg.jpg) ;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment:scroll;
            background-position: center;
            margin: 80px;
            height: 420px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 8px white;
        } 
        h2{
            color:white;
            font-weight:bold;
            font-style: italic;
            
        }
        h1:hover{
            border-bottom: 1px dashed white;
            transition: 0.3s ease-in-out;
            cursor: context-menu;
        }
        td{
            color: aliceblue;
            display: flex;
            padding: 5px;
        }
        input{
            border-radius: 5px;
            background-color: transparent;
            border:transparent white;
            border-style: outset;
            padding: 3px;
        }
        input:hover{
            background-color: whitesmoke;
            transition: 0.1s ease-in;
            cursor:context-menu;
        }
        button{
            position: relative;
            top: 20px;
            border-radius: 5px;
            border: transparent;
            padding: 3px;
            font-weight: bold;
            cursor: pointer;
        }
        button{
             width:150px;
             transition: width 0.5s ease-in-out;
             opacity: 0.9;
        }
        button:focus{
            width:100px;
             background-color:rgb(215, 211, 211);
             color: rgb(96, 193, 96);
        }
        h3{
            position: relative;
            top: 30px;
            color: white;
            font-size: medium;
        }
        a{
            font-weight:bolder;
            text-decoration: none;
            color: black;
        }
        a:hover{
            color: rgb(52, 50, 50);
            transition: 0.1s ease-in;
        }
        #oops{
            color: rgb(51, 51, 156);
        }
        #oops:hover{
            color: rgb(25, 25, 84);
            transition: 0.2s ease-in;
        }
    </style>
</head>
<body>
    <center>
  <div class="container">
    <div class="row">
        <div class="col-sm-12 col-md-12 col-lg-12">
            <div id="container">
            <h2 class="mt-3">SIGN UP</h2>
            <form>
                <table>
                    <tr>
                        <td>Name</td> <td><input type="text"></td>
                    </tr>
        
                    <tr>
                        <td>E-mail</td> <td><input type="email"></td>
                    </tr>
        
                    <tr>
                        <td>Password</td> <td><input type="password"></td>
                    </tr>
                </table>
            </form>
                    <button><a href="../index.html">SIGN UP</a></button>
                <h3>Have an Account? <a id="oops" href="oops.html">Login Here!</a></h3>
            </div>    
        </div>
      </div>   
    </div>
  </div>
    </center>


</body>
</html>
